<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Vigilante do Ar</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">

    <style>
      html, body {
        overflow-y: auto !important; /* Permite fazer scroll na página se necessário */
        height: auto !important;
        margin: 0;
        padding: 0;
        background-color: #231f20; /* Cor de fundo padrão da Unity */
      }

      /* Corrige o container do jogo no telemóvel */
      #unity-container.unity-mobile {
        position: relative !important;
        width: 100% !important;
        height: auto !important;
        max-width: 100% !important;
        aspect-ratio: 1920 / 1080; /* Garante a proporção perfeita do teu jogo */
        margin: 0 auto !important;
        top: 0 !important;
        left: 0 !important;
        transform: none !important;
      }

      /* Corrige o canvas do jogo no telemóvel */
      #unity-canvas.unity-mobile {
        width: 100% !important;
        height: 100% !important;
        position: relative !important;
      }

      /* Ajusta a barra de loading para não quebrar o layout */
      #unity-loading-bar {
        position: absolute !important;
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1920 height=1080 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Vigilante do Ar</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Demo.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Demo.data.unityweb",
        frameworkUrl: buildUrl + "/Demo.framework.js.unityweb",
        codeUrl: buildUrl + "/Demo.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Vision4you",
        productName: "Vigilante do Ar",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Estilo Mobile: Ajustado para respeitar os novos limites do CSS
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        // Alterado para permitir que a página respire e não quebre o ecrã
        meta.content = 'width=device-width, initial-scale=1.0, user-scalable=yes, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

      } else {
        // Estilo Desktop
        canvas.style.width = "1920px";
        canvas.style.height = "1080px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
